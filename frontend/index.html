<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>mepaste 🍅 — a tiny pastebin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="one person · one textarea · one short link" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100%; }
      body {
        background: #f3ece5;
        font-family: "Inter", -apple-system, system-ui, sans-serif;
        color: #1c1c1e;
        -webkit-font-smoothing: antialiased;
      }
      *, *::before, *::after { box-sizing: border-box; }
      @keyframes mp-blink { 50% { opacity: 0; } }
      @keyframes mp-sheet-in {
        0%   { transform: translateY(100%); }
        100% { transform: translateY(0); }
      }
      @keyframes mp-scrim-in {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes mp-shake {
        10%, 90%  { transform: translateX(-2px); }
        20%, 80%  { transform: translateX(4px); }
        30%, 50%, 70% { transform: translateX(-7px); }
        40%, 60%  { transform: translateX(7px); }
      }
      @keyframes mp-pulse {
        0%, 100% { opacity: 0.55; transform: scale(1); }
        50%      { opacity: 0.9;  transform: scale(1.08); }
      }
      @keyframes mp-rain {
        0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        8%   { opacity: 1; }
        85%  { transform: translate(var(--sway, 0), var(--landY, 700px)) rotate(var(--spin, 360deg)); opacity: 1; }
        93%  { transform: translate(var(--sway, 0), calc(var(--landY, 700px) - 4px)) rotate(var(--spin, 360deg)) scaleY(0.7); opacity: 1; }
        100% { transform: translate(var(--sway, 0), var(--landY, 700px)) rotate(var(--spin, 360deg)) scaleY(0.5); opacity: 0; }
      }
      @keyframes mp-mini-splat {
        0%   { transform: scale(0) translateY(-4px); opacity: 0; }
        25%  { transform: scale(1.15) translateY(0); opacity: 1; }
        60%  { transform: scale(1) translateY(0); opacity: 0.95; }
        100% { transform: scale(1) translateY(0); opacity: 0.45; }
      }
      @keyframes mp-toast-in {
        0%   { transform: translateY(24px) scale(0.86); opacity: 0; }
        60%  { transform: translateY(-4px) scale(1.04); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      textarea, input { font-family: inherit; }
      button { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
